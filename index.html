<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>для вадима</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f9d5e5, #f0e6ff, #d5e8f9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            animation: bgShift 12s ease infinite alternate;
            position: relative;
            overflow-x: hidden;
        }
        @keyframes bgShift {
            0% { background: linear-gradient(135deg, #f9d5e5, #f0e6ff, #d5e8f9); }
            100% { background: linear-gradient(135deg, #fce4ec, #ede7f6, #e3f2fd); }
        }
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .particle {
            position: absolute; bottom: -40px; font-size: 1.5rem;
            opacity: 0.25; animation: floatUp 10s infinite ease-in; user-select: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
            10% { opacity: 0.35; }
            90% { opacity: 0.1; }
            100% { transform: translateY(-110vh) scale(0.5) rotate(360deg); opacity: 0; }
        }

        /* Котики на заднем плане */
        .cats-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; display: none;
        }
        .cat-gif {
            position: absolute;
            width: 70px;
            height: auto;
            animation: catDance 3s infinite alternate;
        }
        @keyframes catDance {
            0% { transform: translateY(0) rotate(-5deg); }
            100% { transform: translateY(-30px) rotate(5deg); }
        }

        .card {
            position: relative; z-index: 1;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 30px; padding: 40px 35px;
            max-width: 500px; width: 100%;
            text-align: center;
            border-top: 3px solid rgba(233, 30, 99, 0.3);
            box-shadow: 0 20px 50px rgba(233, 30, 99, 0.2), 0 4px 12px rgba(0,0,0,0.05);
            animation: pulseGlow 3s ease-in-out infinite;
            transition: box-shadow 0.1s ease;
            overflow: hidden;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 20px 50px rgba(233, 30, 99, 0.2), 0 4px 12px rgba(0,0,0,0.05); }
            50% { box-shadow: 0 20px 60px rgba(233, 30, 99, 0.35), 0 6px 18px rgba(0,0,0,0.08); }
            100% { box-shadow: 0 20px 50px rgba(233, 30, 99, 0.2), 0 4px 12px rgba(0,0,0,0.05); }
        }
        .step { display: none; animation: fadeInUp 0.6s ease; }
        .step.active { display: block; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question {
            font-size: 1.5rem; color: #4a2c38; margin-bottom: 25px;
            font-weight: 500; line-height: 1.4;
        }
        .btn {
            background: #e91e63; border: none; color: white;
            padding: 16px 35px; font-size: 1.1rem; font-weight: 600;
            border-radius: 50px; cursor: pointer; transition: all 0.3s;
            width: 100%; letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(233,30,99,0.3);
            margin-top: 10px;
        }
        .btn:hover {
            background: #c2185b; transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(233,30,99,0.4);
        }
        .options {
            display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px;
        }
        input[type="radio"] { display: none; }
        .option-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 14px 20px; border-radius: 50px;
            background: white; border: 2px solid #f0d3de; color: #b34159;
            font-size: 1.1rem; font-weight: 500; cursor: pointer;
            transition: all 0.25s ease; text-align: center;
        }
        .option-btn .emoji { flex: 0 0 2rem; text-align: center; font-size: 1.4rem; }
        .option-btn .text { flex: 1; text-align: left; }
        input[type="radio"]:checked + .option-btn {
            background: #e91e63; border-color: #e91e63; color: white;
            box-shadow: 0 8px 20px rgba(233,30,99,0.3);
        }
        .custom-input {
            width: 100%; padding: 14px 20px; border-radius: 50px;
            border: 2px solid #f0d3de; font-size: 1.1rem; font-weight: 500;
            text-align: center; color: #4a2c38; outline: none;
            transition: all 0.25s; margin-bottom: 10px;
        }
        .custom-input:focus {
            border-color: #e91e63; box-shadow: 0 0 0 3px rgba(233,30,99,0.2);
        }
        .verification-list { text-align: left; margin-bottom: 25px; }
        .verification-item {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; font-size: 1.05rem; color: #4a2c38;
        }
        .choice-buttons { display: flex; gap: 12px; }
        .choice-btn {
            width: 44px; height: 44px; border-radius: 50%;
            border: 2px solid #ddd; background: white; font-size: 1.4rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .choice-btn.green { border-color: #4caf50; color: #4caf50; }
        .choice-btn.red { border-color: #f44336; color: #f44336; }
        .choice-btn.green.selected {
            background: #4caf50; color: white; border-color: #4caf50;
            box-shadow: 0 0 10px rgba(76,175,80,0.5);
        }
        .choice-btn.red.selected {
            background: #f44336; color: white; border-color: #f44336;
            box-shadow: 0 0 10px rgba(244,67,54,0.5);
        }
        .verification-title {
            font-size: 1.3rem; font-weight: 600; color: #4a2c38; margin-bottom: 20px;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-6px); }
            40%,80% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease; }
        .car {
            position: absolute; bottom: 5px; left: -80px;
            font-size: 2rem; animation: driveRight 1s ease-out forwards;
            z-index: 2; pointer-events: none; transform: scaleX(-1);
            white-space: nowrap;
        }
        @keyframes driveRight {
            from { left: -80px; opacity: 1; }
            to { left: calc(100% + 80px); opacity: 1; }
        }
        #map {
            height: 300px; width: 100%; border-radius: 20px; margin-bottom: 15px;
            border: 2px solid #f0d3de;
        }
        .date-time-container {
            display: flex; gap: 12px; justify-content: center; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .date-time-container input[type="date"] {
            padding: 14px 20px; border-radius: 50px;
            border: 2px solid #f0d3de; font-size: 1.1rem; font-weight: 500;
            color: #4a2c38; outline: none; text-align: left;
            transition: all 0.25s; flex: 1; min-width: 170px;
            background: white;
        }
        .date-time-container select {
            padding: 14px 20px; border-radius: 50px;
            border: 2px solid #f0d3de; font-size: 1.1rem; font-weight: 500;
            color: #4a2c38; outline: none; text-align: center;
            transition: all 0.25s; flex: 1; min-width: 90px;
            background: white; cursor: pointer;
        }
        .date-time-container input:focus,
        .date-time-container select:focus {
            border-color: #e91e63; box-shadow: 0 0 0 3px rgba(233,30,99,0.2);
        }

        /* Новый безопасный контейнер для кнопок */
        .safe-button-area {
            position: relative;
            width: 100%;
            height: 130px; /* достаточно для убегания */
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 20px;
            padding-top: 10px;
        }
        .yes-btn-wrapper {
            position: relative;
            z-index: 2;
            flex: 0 0 auto;
        }
        .no-run-zone {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; /* чтобы не мешать кликам */
        }

        .btn.yes-btn {
            width: 160px; /* фиксированная ширина */
            margin: 0;
        }
        .no-btn {
            position: relative;
            transition: none;
            width: 160px; /* такая же ширина */
            margin: 0;
        }
        .no-btn.absolute-runaway {
            position: absolute;
            z-index: 1; /* ниже чем у yes */
            width: auto;
            margin: 0;
            pointer-events: auto;
        }

        .back-btn {
            background: transparent;
            color: #b34159;
            border: 2px solid #f0d3de;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 6px;
        }
        .back-btn:hover {
            background: rgba(233,30,99,0.1);
            border-color: #e91e63;
        }
        .spark {
            position: absolute; z-index: 10; pointer-events: none;
            animation: sparkle 1.2s ease-out forwards;
            font-size: 2rem;
        }
        @keyframes sparkle {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2); }
        }
    </style>
</head>
<body>

<div class="particles" id="particlesContainer"></div>
<div class="cats-container" id="catsContainer"></div>

<div class="card" id="mainCard">

    <!-- Шаг 1 -->
    <div class="step active" data-step="1">
        <p class="question">Gentleman, start your engines</p>
        <button type="button" class="btn next-slide-btn" data-next="2">газ газ полный газ</button>
    </div>

    <!-- Шаг 2 -->
    <div class="step" data-step="2">
        <p class="question">Ты точно хочешь со мной пообщаться?</p>
        <div class="safe-button-area" id="safeArea">
            <div class="yes-btn-wrapper">
                <button class="btn yes-btn" id="yesBtn">Да</button>
            </div>
            <button class="btn no-btn" id="noBtn">Нет</button>
        </div>
    </div>

    <!-- Шаг 3: Верификация -->
    <div class="step" data-step="3">
        <div class="verification-title">Верификация</div>
        <div class="verification-list" id="verificationList">
            <div class="verification-item" data-id="1"><span>Ты очень красивый</span><div class="choice-buttons"><button class="choice-btn green" data-choice="yes">✅</button><button class="choice-btn red" data-choice="no">❌</button></div></div>
            <div class="verification-item" data-id="2"><span>Ты выглядишь как хороший парень</span><div class="choice-buttons"><button class="choice-btn green" data-choice="yes">✅</button><button class="choice-btn red" data-choice="no">❌</button></div></div>
            <div class="verification-item" data-id="3"><span>Ты талантливый</span><div class="choice-buttons"><button class="choice-btn green" data-choice="yes">✅</button><button class="choice-btn red" data-choice="no">❌</button></div></div>
            <div class="verification-item" data-id="4"><span>Тебя зовут Вадим</span><div class="choice-buttons"><button class="choice-btn green" data-choice="yes">✅</button><button class="choice-btn red" data-choice="no">❌</button></div></div>
            <div class="verification-item" data-id="5"><span>Иногда тебя зовут Майк</span><div class="choice-buttons"><button class="choice-btn green" data-choice="yes">✅</button><button class="choice-btn red" data-choice="no">❌</button></div></div>
        </div>
        <button type="button" class="btn" id="verificationSubmit">отправить в службу безопасности</button>
    </div>

    <!-- Шаг 4: Чё хочешь? -->
    <div class="step" data-step="4">
        <p class="question">Чё хочешь?</p>
        <div class="options">
            <label><input type="radio" name="q3" value="🌿 Просто погулять (например, ботсад)"><span class="option-btn"><span class="emoji">🌿</span><span class="text">Просто погулять (например, ботсад)</span></span></label>
            <label><input type="radio" name="q3" value="☕ По классике — в кофейне"><span class="option-btn"><span class="emoji">☕</span><span class="text">По классике — в кофейне</span></span></label>
            <label><input type="radio" name="q3" value="🌊 Посидеть где-нибудь у воды"><span class="option-btn"><span class="emoji">🌊</span><span class="text">Посидеть где-нибудь у воды</span></span></label>
        </div>
        <input type="text" class="custom-input" id="customProposal" placeholder="✍️ Твои предложения и пожелания" maxlength="200">
        <button type="button" class="btn next-step-btn" data-next="5">далее</button>
    </div>

    <!-- Шаг 5: Карта -->
    <div class="step" data-step="5">
        <p class="question">Где тебе удобно?<br><span style="font-size:1rem;color:#b3818d;">Нажми на карту, чтобы поставить метку</span></p>
        <div id="map"></div>
        <button type="button" class="btn next-step-btn" data-next="6">далее</button>
        <button type="button" class="back-btn" id="backFromMap">← назад</button>
    </div>

    <!-- Шаг 6: Календарь и время -->
    <div class="step" data-step="6">
        <p class="question">Когда? 📅</p>
        <div class="date-time-container">
            <input type="date" id="selectedDate" />
            <select id="selectedHours"></select>
            <select id="selectedMinutes"></select>
        </div>
        <button type="button" class="btn" id="nextFromDate">далее</button>
        <button type="button" class="back-btn" id="backFromDate">← назад</button>
    </div>

    <!-- Шаг 7: Финал -->
    <div class="step" data-step="7">
        <p class="question">ура-ура буду ждать!!</p>
        <button type="button" class="btn" id="finalSubmit">Отправить ответы</button>
        <button type="button" class="back-btn" id="backFromFinal">← назад</button>
    </div>

    <form id="inviteForm" action="https://formspree.io/f/mqeowdnk" method="POST" style="display: none;"></form>
    <audio id="happyAudio" src="happy.mp3" loop preload="auto"></audio>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Цветочки
    (function createParticles() {
        const container = document.getElementById('particlesContainer');
        const symbols = ['🌸', '💮', '🌺', '✿', '🌷'];
        for (let i = 0; i < 35; i++) {
            const particle = document.createElement('span');
            particle.classList.add('particle');
            particle.textContent = symbols[Math.floor(Math.random() * symbols.length)];
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
            particle.style.color = Math.random() > 0.5 ? '#e91e63' : '#f48fb1';
            container.appendChild(particle);
        }
    })();

    // Танцующие котики (равномерно по экрану, 30 штук)
    const catsContainer = document.getElementById('catsContainer');
    function spawnCats() {
        catsContainer.innerHTML = '';
        catsContainer.style.display = 'block';
        const cols = 6, rows = 5;
        const cellWidth = 100 / cols;
        const cellHeight = 100 / rows;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cat = document.createElement('img');
                cat.src = 'cat.gif';
                cat.className = 'cat-gif';
                const left = cellWidth * c + Math.random() * (cellWidth * 0.5) + cellWidth * 0.25;
                const top = cellHeight * r + Math.random() * (cellHeight * 0.5) + cellHeight * 0.25;
                cat.style.left = left + '%';
                cat.style.top = top + '%';
                cat.style.width = (40 + Math.random() * 40) + 'px';
                cat.style.animationDelay = Math.random() * 2 + 's';
                catsContainer.appendChild(cat);
            }
        }
    }
    function clearCats() {
        catsContainer.innerHTML = '';
        catsContainer.style.display = 'none';
    }

    const card = document.getElementById('mainCard');
    document.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const cardCenterX = rect.left + rect.width / 2;
        const cardCenterY = rect.top + rect.height / 2;
        const deltaX = (e.clientX - cardCenterX) / 30;
        const deltaY = (e.clientY - cardCenterY) / 30;
        card.style.boxShadow = `
            ${deltaX}px ${deltaY}px 30px rgba(233, 30, 99, 0.25),
            ${-deltaX * 0.5}px ${-deltaY * 0.5}px 15px rgba(0,0,0,0.08)
        `;
    });

    const soundEngine = new Audio('engine.mp3');
    const soundSuccess = new Audio('success.mp3');
    const soundBonk = new Audio('bonk.mp3');
    const soundYes = new Audio('yes.wav');
    const happyAudio = document.getElementById('happyAudio');

    function spawnCar() {
        const car = document.createElement('span');
        car.className = 'car';
        car.textContent = '🚗💨';
        card.appendChild(car);
        car.addEventListener('animationend', () => car.remove());
    }

    document.querySelectorAll('.next-slide-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            soundEngine.currentTime = 0;
            soundEngine.play().catch(() => {});
            spawnCar();
            switchToStep(parseInt(this.dataset.next));
        });
    });

    // Убегающая кнопка «Нет» с защитой зоны «Да»
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const safeArea = document.getElementById('safeArea');
    let isRunawayActive = false;

    function getSafeBounds() {
        const areaRect = safeArea.getBoundingClientRect();
        const yesRect = yesBtn.getBoundingClientRect();
        const noWidth = noBtn.offsetWidth;
        const noHeight = noBtn.offsetHeight;

        // Левая и правая границы всей области
        const minX = 10;
        const maxX = areaRect.width - noWidth - 10;

        // Верх и низ области (от 0 до высоты safeArea)
        const minY = 10;
        const maxY = areaRect.height - noHeight - 10;

        // Зона Yes относительно safeArea
        const yesLeft = yesRect.left - areaRect.left;
        const yesRight = yesRect.right - areaRect.left;
        const yesTop = yesRect.top - areaRect.top;
        const yesBottom = yesRect.bottom - areaRect.top;

        return { minX, maxX, minY, maxY, yesLeft, yesRight, yesTop, yesBottom };
    }

    function moveNoButton() {
        if (!isRunawayActive) {
            noBtn.classList.add('absolute-runaway');
            // начальное положение — там же, где была в потоке
            const areaRect = safeArea.getBoundingClientRect();
            const noRect = noBtn.getBoundingClientRect();
            noBtn.style.left = (noRect.left - areaRect.left) + 'px';
            noBtn.style.top = (noRect.top - areaRect.top) + 'px';
            isRunawayActive = true;
        }

        const bounds = getSafeBounds();
        const noWidth = noBtn.offsetWidth;
        const noHeight = noBtn.offsetHeight;

        // Попытки найти место, не пересекающее Yes
        let attempts = 0;
        const maxAttempts = 50;
        let left, top;
        do {
            left = bounds.minX + Math.random() * (bounds.maxX - bounds.minX);
            top = bounds.minY + Math.random() * (bounds.maxY - bounds.minY);

            // прямоугольник «Нет»
            const noLeft = left;
            const noRight = left + noWidth;
            const noTop = top;
            const noBottom = top + noHeight;

            const overlaps = (
                noLeft < bounds.yesRight &&
                noRight > bounds.yesLeft &&
                noTop < bounds.yesBottom &&
                noBottom > bounds.yesTop
            );

            if (!overlaps) break;
            attempts++;
        } while (attempts < maxAttempts);

        noBtn.style.left = left + 'px';
        noBtn.style.top = top + 'px';
    }

    noBtn.addEventListener('mouseenter', moveNoButton);
    noBtn.addEventListener('click', (e) => {
        e.preventDefault();
        moveNoButton();
    });

    function resetNoButton() {
        if (isRunawayActive) {
            noBtn.classList.remove('absolute-runaway');
            noBtn.style.left = '';
            noBtn.style.top = '';
            isRunawayActive = false;
        }
    }

    document.getElementById('yesBtn').addEventListener('click', () => {
        resetNoButton();
        soundYes.currentTime = 0;
        soundYes.play().catch(() => {});
        switchToStep(3);
    });

    // Верификация
    const verificationItems = document.querySelectorAll('.verification-item');
    const verificationSubmit = document.getElementById('verificationSubmit');
    const choices = {};
    verificationItems.forEach(item => {
        const id = item.dataset.id;
        choices[id] = null;
        const greenBtn = item.querySelector('.choice-btn.green');
        const redBtn = item.querySelector('.choice-btn.red');
        greenBtn.addEventListener('click', () => {
            redBtn.classList.remove('selected');
            greenBtn.classList.add('selected');
            choices[id] = true;
        });
        redBtn.addEventListener('click', () => {
            greenBtn.classList.remove('selected');
            redBtn.classList.add('selected');
            choices[id] = false;
        });
    });
    verificationSubmit.addEventListener('click', () => {
        if (Object.values(choices).every(val => val === true)) {
            createSparkles(20);
            soundSuccess.currentTime = 0;
            soundSuccess.play().catch(() => {});
            setTimeout(() => switchToStep(4), 600);
        } else {
            soundBonk.currentTime = 0;
            soundBonk.play().catch(() => {});
            verificationSubmit.classList.add('shake');
            setTimeout(() => verificationSubmit.classList.remove('shake'), 400);
        }
    });

    // Динамические опции времени
    function updateTimeOptions() {
        const dateVal = document.getElementById('selectedDate').value;
        const hoursSelect = document.getElementById('selectedHours');
        const minutesSelect = document.getElementById('selectedMinutes');
        if (!dateVal) {
            buildDefaultOptions();
            return;
        }
        const [year, month, day] = dateVal.split('-').map(Number);
        const dateObj = new Date(year, month - 1, day);
        const dayOfWeek = dateObj.getDay(); // 0 вс, 1 пн, 2 вт, 3 ср, 4 чт, 5 пт, 6 сб

        hoursSelect.innerHTML = '';
        for (let h = 9; h <= 22; h++) {
            let hasValidMinute = false;
            for (let m of [0, 15, 30, 45]) {
                if (h === 22 && m > 0) continue;
                const timeNumber = h * 60 + m;
                let blocked = false;
                if (dayOfWeek === 1 && timeNumber >= 15 * 60) blocked = true;      // пн с 15:00
                else if (dayOfWeek === 2 && timeNumber < 17 * 60 + 30) blocked = true; // вт до 17:30
                else if (dayOfWeek === 3 && timeNumber < 17 * 60 + 30) blocked = true; // ср до 17:30
                else if (dayOfWeek === 4 && timeNumber >= 16 * 60) blocked = true; // чт с 16:00
                if (!blocked) hasValidMinute = true;
            }
            if (hasValidMinute) {
                const option = document.createElement('option');
                option.value = h;
                option.text = String(h).padStart(2, '0');
                hoursSelect.appendChild(option);
            }
        }
        if (hoursSelect.options.length === 0) {
            const option = document.createElement('option');
            option.value = '';
            option.text = '--';
            hoursSelect.appendChild(option);
        }
        hoursSelect.selectedIndex = 0;
        updateMinutesOptions(dayOfWeek);
    }

    function updateMinutesOptions(dayOfWeek) {
        const hoursSelect = document.getElementById('selectedHours');
        const minutesSelect = document.getElementById('selectedMinutes');
        const selectedHour = hoursSelect.value;
        minutesSelect.innerHTML = '';
        if (selectedHour === '' || selectedHour === undefined) return;
        const h = parseInt(selectedHour);
        for (let m of [0, 15, 30, 45]) {
            if (h === 22 && m > 0) continue;
            const timeNumber = h * 60 + m;
            let blocked = false;
            if (dayOfWeek === 1 && timeNumber >= 15 * 60) blocked = true;
            else if (dayOfWeek === 2 && timeNumber < 17 * 60 + 30) blocked = true;
            else if (dayOfWeek === 3 && timeNumber < 17 * 60 + 30) blocked = true;
            else if (dayOfWeek === 4 && timeNumber >= 16 * 60) blocked = true;
            if (!blocked) {
                const option = document.createElement('option');
                option.value = m;
                option.text = String(m).padStart(2, '0');
                minutesSelect.appendChild(option);
            }
        }
        if (minutesSelect.options.length === 0) {
            const option = document.createElement('option');
            option.value = '';
            option.text = '--';
            minutesSelect.appendChild(option);
        }
        minutesSelect.selectedIndex = 0;
    }

    function buildDefaultOptions() {
        const hoursSelect = document.getElementById('selectedHours');
        const minutesSelect = document.getElementById('selectedMinutes');
        hoursSelect.innerHTML = '';
        for (let h = 9; h <= 22; h++) {
            const option = document.createElement('option');
            option.value = h;
            option.text = String(h).padStart(2, '0');
            if (h === 12) option.selected = true;
            hoursSelect.appendChild(option);
        }
        hoursSelect.selectedIndex = 3; // 12
        // дефолтные минуты
        minutesSelect.innerHTML = '';
        for (let m of [0, 15, 30, 45]) {
            const option = document.createElement('option');
            option.value = m;
            option.text = String(m).padStart(2, '0');
            minutesSelect.appendChild(option);
        }
    }

    document.getElementById('selectedDate').addEventListener('change', updateTimeOptions);
    document.getElementById('selectedHours').addEventListener('change', function() {
        const dateVal = document.getElementById('selectedDate').value;
        if (!dateVal) return;
        const [year, month, day] = dateVal.split('-').map(Number);
        const dateObj = new Date(year, month - 1, day);
        const dayOfWeek = dateObj.getDay();
        updateMinutesOptions(dayOfWeek);
    });

    // Инициализация даты и времени
    (function initDateTime() {
        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const yyyy = today.getFullYear();
        const dateInput = document.getElementById('selectedDate');
        dateInput.setAttribute('min', yyyy + '-' + mm + '-' + dd);
        dateInput.value = yyyy + '-' + mm + '-' + dd;
        updateTimeOptions();
    })();

    // Переход с шага 6
    document.getElementById('nextFromDate').addEventListener('click', function() {
        const dateVal = document.getElementById('selectedDate').value;
        const hoursVal = document.getElementById('selectedHours').value;
        const minutesVal = document.getElementById('selectedMinutes').value;
        if (!dateVal || hoursVal === '' || minutesVal === '') {
            alert('Пожалуйста, выбери дату и время.');
            return;
        }
        switchToStep(7);
    });

    document.querySelectorAll('.next-step-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const next = parseInt(this.dataset.next);
            const currentStep = parseInt(this.closest('.step').dataset.step);
            if (currentStep === 4) {
                const selectedRadio = document.querySelector('input[name="q3"]:checked');
                let type = 'spark';
                if (selectedRadio) {
                    const val = selectedRadio.value;
                    if (val.includes('🌿')) type = 'leaves';
                    else if (val.includes('☕')) type = 'coffee';
                    else if (val.includes('🌊')) type = 'water';
                }
                createBigEffect(type);
                setTimeout(() => switchToStep(next), 900);
            } else {
                switchToStep(next);
            }
        });
    });

    document.getElementById('backFromMap').addEventListener('click', () => switchToStep(4));
    document.getElementById('backFromDate').addEventListener('click', () => switchToStep(5));
    document.getElementById('backFromFinal').addEventListener('click', () => {
        if (!happyAudio.paused) { happyAudio.pause(); happyAudio.currentTime = 0; }
        clearCats();
        switchToStep(6);
    });

    // Карта с кастомной иконкой
    let selectedCoords = null;
    let map, marker;
    const customIcon = L.icon({
        iconUrl: 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA0MCA0MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIyMCIgY3k9IjIwIiByPSIxOCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIyIiBmaWxsPSIjZTkxZTYzIi8+PGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iOCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIyIiBmaWxsPSJ3aGl0ZSIvPjwvc3ZnPg==',
        iconSize: [40, 40],
        iconAnchor: [20, 40],
        popupAnchor: [0, -40]
    });

    function initMap() {
        const mapContainer = document.getElementById('map');
        if (!mapContainer || mapContainer.offsetWidth === 0) {
            setTimeout(initMap, 100);
            return;
        }
        if (map) {
            map.invalidateSize();
            return;
        }
        map = L.map('map').setView([55.7558, 37.6173], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        map.on('click', function(e) {
            const { lat, lng } = e.latlng;
            selectedCoords = { lat, lng };
            if (marker) {
                marker.setLatLng(e.latlng);
            } else {
                marker = L.marker(e.latlng, {icon: customIcon}).addTo(map);
            }
        });
        setTimeout(() => map.invalidateSize(), 200);
    }

    function switchToStep(stepNumber) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        const nextStep = document.querySelector(`.step[data-step="${stepNumber}"]`);
        if (nextStep) {
            nextStep.classList.add('active');
            nextStep.style.animation = 'none';
            nextStep.offsetHeight;
            nextStep.style.animation = '';
            if (stepNumber === 5) {
                setTimeout(initMap, 300);
            }
            if (stepNumber === 7) {
                spawnCats();
                if (happyAudio.paused) {
                    happyAudio.play().catch(() => {});
                }
            } else {
                clearCats();
                if (!happyAudio.paused) {
                    happyAudio.pause();
                    happyAudio.currentTime = 0;
                }
            }
            if (stepNumber !== 2) resetNoButton();
        }
    }

    function createSparkles(count) {
        for (let i = 0; i < count; i++) {
            const spark = document.createElement('span');
            spark.className = 'spark';
            spark.textContent = '✨';
            spark.style.left = Math.random() * 100 + '%';
            spark.style.top = Math.random() * 100 + '%';
            spark.style.setProperty('--dx', (Math.random() - 0.5) * 200 + 'px');
            spark.style.setProperty('--dy', (Math.random() - 0.5) * 200 + 'px');
            card.appendChild(spark);
            spark.addEventListener('animationend', () => spark.remove());
        }
    }

    function createBigEffect(type) {
        const emojis = {
            leaves: ['🍃', '🌿', '🍂'],
            coffee: ['☕️', '☕', '🤎'],
            water: ['💧', '🌊', '💦'],
            spark: ['✦', '✧', '✨']
        };
        const set = emojis[type] || emojis.spark;
        for (let i = 0; i < 24; i++) {
            const el = document.createElement('span');
            el.className = 'spark';
            el.textContent = set[Math.floor(Math.random() * set.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.top = Math.random() * 100 + '%';
            el.style.setProperty('--dx', (Math.random() - 0.5) * 250 + 'px');
            el.style.setProperty('--dy', (Math.random() - 0.5) * 250 - 50 + 'px');
            card.appendChild(el);
            el.addEventListener('animationend', () => el.remove());
        }
    }

    // Финальная отправка
    document.getElementById('finalSubmit').addEventListener('click', async function() {
        const formData = new FormData();
        const verificationResults = Object.entries(choices).map(([id, val]) => {
            const item = document.querySelector(`.verification-item[data-id="${id}"] span`);
            const statement = item ? item.textContent : id;
            const answer = val === true ? '✅' : val === false ? '❌' : '—';
            return statement + ': ' + answer;
        }).join('\n');
        formData.append('Верификация', verificationResults);

        const selectedOption = document.querySelector('input[name="q3"]:checked');
        const customText = document.getElementById('customProposal').value.trim();
        let plan = selectedOption ? selectedOption.value : '';
        if (customText) plan += (plan ? ' / ' : '') + 'Своё: ' + customText;
        formData.append('План', plan || '(ничего не выбрано)');

        if (selectedCoords) {
            formData.append('Место (координаты)', `широта: ${selectedCoords.lat.toFixed(6)}, долгота: ${selectedCoords.lng.toFixed(6)}`);
        } else {
            formData.append('Место (координаты)', '(не выбрано)');
        }

        const dateVal = document.getElementById('selectedDate').value;
        const hoursVal = document.getElementById('selectedHours').value;
        const minutesVal = document.getElementById('selectedMinutes').value;
        const timeVal = hoursVal !== '' && minutesVal !== '' ? `${String(hoursVal).padStart(2,'0')}:${String(minutesVal).padStart(2,'0')}` : '';
        formData.append('Дата', dateVal || '(не выбрана)');
        formData.append('Время', timeVal || '(не выбрано)');

        try {
            const response = await fetch('https://formspree.io/f/mqeowdnk', {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });
            if (response.ok) {
                const finalStep = document.querySelector('[data-step="7"]');
                finalStep.innerHTML = '<p class="question">как же я заебался делать этот сайт, ёбаный пиздец</p>';
                clearCats();
                if (!happyAudio.paused) {
                    happyAudio.pause();
                    happyAudio.currentTime = 0;
                }
            } else {
                alert('Что-то пошло не так. Попробуй ещё раз.');
            }
        } catch (error) {
            alert('Ошибка соединения. Проверь интернет.');
        }
    });
</script>
